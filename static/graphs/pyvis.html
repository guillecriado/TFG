        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var allEdges;

              var originalNodes;
              var network;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#9BAEBC", "font": {"color": "black"}, "id": 0, "label": "ID:0\nNeurons:4\nNeuron type: Input Neuron", "neurons": 4, "shape": "dot", "size": 10}, {"color": "#B7CECE", "font": {"color": "black"}, "id": 2, "label": "ID:2\nNeurons:1\nNeuron type: Hidden Neuron Layer: 1", "neurons": 1, "shape": "dot", "size": 10}, {"color": "#B7CECE", "font": {"color": "black"}, "id": 3, "label": "ID:3\nNeurons:1\nNeuron type: Hidden Neuron Layer: 1", "neurons": 1, "shape": "dot", "size": 10}, {"color": "#B7CECE", "font": {"color": "black"}, "id": 4, "label": "ID:4\nNeurons:1\nNeuron type: Hidden Neuron Layer: 2", "neurons": 1, "shape": "dot", "size": 10}, {"color": "#B7CECE", "font": {"color": "black"}, "id": 5, "label": "ID:5\nNeurons:1\nNeuron type: Hidden Neuron Layer: 2", "neurons": 1, "shape": "dot", "size": 10}, {"color": "#B7CECE", "font": {"color": "black"}, "id": 6, "label": "ID:6\nNeurons:1\nNeuron type: Hidden Neuron Layer: 3", "neurons": 1, "shape": "dot", "size": 10}, {"color": "#B7CECE", "font": {"color": "black"}, "id": 7, "label": "ID:7\nNeurons:1\nNeuron type: Hidden Neuron Layer: 3", "neurons": 1, "shape": "dot", "size": 10}, {"color": "#B7CECE", "font": {"color": "black"}, "id": 1, "label": "ID:1\nNeurons:1\nNeuron type: Target Neuron", "neurons": 1, "shape": "dot", "size": 10}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "36494E", "from": 0, "to": 2, "width": 1}, {"arrows": "to", "color": "36494E", "from": 0, "to": 3, "width": 1}, {"arrows": "to", "color": "36494E", "from": 2, "to": 4, "width": 1}, {"arrows": "to", "color": "36494E", "from": 2, "to": 5, "width": 1}, {"arrows": "to", "color": "36494E", "from": 3, "to": 4, "width": 1}, {"arrows": "to", "color": "36494E", "from": 3, "to": 5, "width": 1}, {"arrows": "to", "color": "36494E", "from": 4, "to": 6, "width": 1}, {"arrows": "to", "color": "36494E", "from": 4, "to": 7, "width": 1}, {"arrows": "to", "color": "36494E", "from": 5, "to": 6, "width": 1}, {"arrows": "to", "color": "36494E", "from": 5, "to": 7, "width": 1}, {"arrows": "to", "color": "36494E", "from": 6, "to": 1, "width": 1}, {"arrows": "to", "color": "36494E", "from": 7, "to": 1, "width": 1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "solver": "hierarchicalRepulsion", "hierarchicalRepulsion": {"centralGravity": 0.2, "springLength": 100, "springConstant": 0.01, "nodeDistance": 150, "damping": 0.09}}, "layout": {"hierarchical": {"enabled": true, "direction": "LR", "sortMethod": "directed", "levelSeparation": 200}}, "nodes": {"shape": "circle", "font": {"size": 12, "color": "black"}}, "edges": {"arrows": {"to": {"enabled": true, "scaleFactor": 0.5}}, "smooth": {"type": "continuous"}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
